<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gov Docket Extractor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="background-animation"></div>

    <div class="container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <h1>DocketExtractor <span>AI</span></h1>
            </div>
            <p class="subtitle">Universal Government Docket Intelligence</p>
        </header>

        <main>
            <section class="glass-panel input-section">
                <h2>Configure Extraction</h2>
                <form id="extract-form">
                    <div class="input-group">
                        <label for="url">Target URL</label>
                        <input type="url" id="url" required placeholder="https://puc-onbase.nv.gov/"
                            value="https://puc-onbase.nv.gov/">
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label for="start_date">Start Date</label>
                            <input type="date" id="start_date" required value="2026-04-01">
                        </div>
                        <div class="input-group">
                            <label for="end_date">End Date</label>
                            <input type="date" id="end_date" required value="2026-04-16">
                        </div>
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label for="engine">Extraction Engine</label>
                            <select id="engine">
                                <option value="playwright" selected>🤖 Agentic Playwright (General)</option>
                                <option value="sonnet">⚡ High-Accuracy Sonnet (DOM Chunking)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="model">LLM Model</label>
                            <select id="model">
                                <option value="openrouter/meta-llama/llama-3.3-70b-instruct" selected>Llama 3.3 70B Instruct (Fast)</option>
                                <option value="openrouter/google/gemini-2.5-flash-preview:thinking">Gemini 2.5 Flash (Thinking)</option>
                                <option value="openrouter/google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
                                <option value="openrouter/anthropic/claude-sonnet-4-5">Claude Sonnet 4.5</option>
                                <option value="openrouter/qwen/qwen3-32b">Qwen 3 32B</option>
                                <option value="openrouter/meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B (Lightweight)</option>
                                <option value="openrouter/deepseek/deepseek-r1">DeepSeek R1 (Reasoning)</option>
                            </select>
                        </div>
                    </div>

                    <div class="actions">
                        <button type="submit" id="extractBtn">
                            <span class="btn-text">Extract Dockets</span>
                            <div class="spinner hidden"></div>
                        </button>
                        <button type="button" id="stopBtn" class="stop-btn hidden" onclick="stopExtraction()">
                            Stop Process
                        </button>
                    </div>
                </form>
            </section>

            <div class="output-container">
                <section class="glass-panel logs-section">
                    <div class="panel-header">
                        <h2>Live Process Logs</h2>
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <div class="cost-tracker" id="cost-tracker">Cost: $0.000000</div>
                            <button type="button" id="copyLogsBtn" class="copy-logs-btn" onclick="copyLogs()" title="Copy all logs to clipboard">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                <span>Copy</span>
                            </button>
                            <span class="status-indicator" id="status-indicator"></span>
                        </div>
                    </div>
                    <div class="logs-container" id="logs">
                        <div class="log-entry system">Ready to extract documents...</div>
                    </div>
                </section>

                <section class="glass-panel results-section">
                    <h2>Extracted Documents</h2>
                    <div class="results-grid" id="results">
                        <div class="empty-state">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="9" y1="3" x2="9" y2="21"></line>
                            </svg>
                            <p>No documents extracted yet. Run a scan to see results here.</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
